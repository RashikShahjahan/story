<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Story Animations</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; color: white; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .slide { position: fixed; inset: 0; opacity: 0; pointer-events: none; transition: opacity 500ms ease; }
    .slide.active { opacity: 1; pointer-events: auto; }
    iframe { width: 100%; height: 100%; border: 0; display: block; background: #050505; }
    .hud { position: fixed; left: 16px; right: 16px; bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 12px; border-radius: 999px; background: rgb(0 0 0 / 55%); backdrop-filter: blur(10px); font-size: 14px; }
    button { border: 0; border-radius: 999px; padding: 8px 12px; background: white; color: #111; cursor: pointer; font: inherit; }
    .controls { display: flex; gap: 8px; }
  </style>
</head>
<body>
<section class="slide active" data-index="0">
  <iframe src="file:///Users/rashik/story/animations/mr-fox-1.html" title="mr-fox-1.html"></iframe>
</section>
<section class="slide" data-index="1">
  <iframe src="file:///Users/rashik/story/animations/mr-fox-2.html" title="mr-fox-2.html"></iframe>
</section>
<section class="slide" data-index="2">
  <iframe src="file:///Users/rashik/story/animations/mr-fox-3.html" title="mr-fox-3.html"></iframe>
</section>
<section class="slide" data-index="3">
  <iframe src="file:///Users/rashik/story/animations/mr-fox-4.html" title="mr-fox-4.html"></iframe>
</section>
<section class="slide" data-index="4">
  <iframe src="file:///Users/rashik/story/animations/mr-fox-5.html" title="mr-fox-5.html"></iframe>
</section>
<section class="slide" data-index="5">
  <iframe src="file:///Users/rashik/story/animations/mr-fox-6.html" title="mr-fox-6.html"></iframe>
</section>
<section class="slide" data-index="6">
  <iframe src="file:///Users/rashik/story/animations/mr-fox-7.html" title="mr-fox-7.html"></iframe>
</section>
<section class="slide" data-index="7">
  <iframe src="file:///Users/rashik/story/animations/mr-fox-8.html" title="mr-fox-8.html"></iframe>
</section>
  <div class="hud">
    <div><span id="counter">1</span> / 8</div>
    <div class="controls">
      <button id="prev" type="button">Previous</button>
      <button id="toggle" type="button">Pause</button>
      <button id="next" type="button">Next</button>
    </div>
  </div>
  <script>
    const slides = [...document.querySelectorAll('.slide')];
    const counter = document.querySelector('#counter');
    const toggle = document.querySelector('#toggle');
    let index = 0;
    let playing = true;
    let timer;

    function show(nextIndex) {
      slides[index].classList.remove('active');
      index = (nextIndex + slides.length) % slides.length;
      slides[index].classList.add('active');
      counter.textContent = String(index + 1);
      restart();
    }

    function restart() {
      clearInterval(timer);
      if (playing) timer = setInterval(() => show(index + 1), 30000);
    }

    document.querySelector('#prev').addEventListener('click', () => show(index - 1));
    document.querySelector('#next').addEventListener('click', () => show(index + 1));
    toggle.addEventListener('click', () => {
      playing = !playing;
      toggle.textContent = playing ? 'Pause' : 'Play';
      restart();
    });
    addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') show(index - 1);
      if (event.key === 'ArrowRight') show(index + 1);
      if (event.key === ' ') {
        event.preventDefault();
        toggle.click();
      }
    });
    restart();
  </script>
</body>
</html>
